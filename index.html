<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flower Designer Pro | オリジナル花生けツール</title>
    <!-- CSS 分離 -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="mode-tabs">
        <button id="tab-paint" class="tab-btn active">ペイント</button>
        <button id="tab-slider" class="tab-btn">スライダー</button>
    </div>

    <div id="sidebar" class="sidebar hidden">
        <div class="sidebar-content">
            <h3>花びら設定</h3>
            <div class="control-group">
                <label>枚数: <span id="petal-count-val">5</span></label>
                <input type="range" id="petal-count" min="3" max="12" value="5">
            </div>
            <div class="control-group">
                <label>中心からの距離: <span id="petal-dist-val">13</span></label>
                <input type="range" id="petal-dist" min="0" max="300" value="13">
            </div>
            <div class="control-group">
                <label>先端の位置: <span id="petal-tip-val">120</span></label>
                <input type="range" id="petal-tip" min="-100" max="300" value="120">
            </div>
            <div class="control-group">
                <label>最大膨らみの位置: <span id="petal-reach-val">75</span></label>
                <input type="range" id="petal-reach" min="0" max="300" value="75">
            </div>
            <div class="control-group">
                <label>幅: <span id="petal-width-val">100</span></label>
                <input type="range" id="petal-width" min="10" max="200" value="100">
            </div>
            <div class="control-group">
                <label>回転: <span id="petal-rotate-val">54</span>°</label>
                <input type="range" id="petal-rotate" min="0" max="360" value="54">
            </div>
            <div class="control-group">
                <label>全体サイズ: <span id="petal-size-val">1.0</span>倍</label>
                <input type="range" id="petal-size" min="0.5" max="2.0" step="0.1" value="1.0">
            </div>
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <div class="toolbar">
        <div class="tool-group paint-only">
            <button id="tool-pen" class="active" title="ペン">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 19l7-7 3 3-7 7-3-3z" />
                    <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z" />
                    <path d="M2 2l5 5" />
                </svg>
            </button>
            <button id="tool-eraser" title="消しゴム">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 20H7L3 16C2 15 2 13 3 12L13 2L22 11L20 20Z" />
                    <path d="M17 17L7 7" />
                </svg>
            </button>
            <button id="tool-bucket" title="塗りつぶし">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M7 11V5a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v6" />
                    <path d="M4 11h16v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-8Z" />
                    <path d="M4 15h16" />
                </svg>
            </button>
        </div>

        <div class="tool-group paint-only">
            <div class="brush-control">
                <input type="range" id="brush-size" min="1" max="5" value="3">
                <span class="size-label">太さ: <span id="size-val">3</span></span>
            </div>
        </div>

        <div class="tool-group paint-only">
            <button id="btn-undo" title="元に戻す">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 10h10a5 5 0 0 1 0 10H3M3 10l4-4M3 10l4 4" />
                </svg>
            </button>
            <button id="btn-redo" title="やり直し">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 10H11a5 5 0 0 0 0 10h10M21 10l-4-4M21 10l-4 4" />
                </svg>
            </button>
            <button id="btn-clear" title="全消去">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
                </svg>
            </button>
        </div>

        <button id="btn-download-dxf" class="btn-download" title="DXFをダウンロード">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                <polyline points="14 2 14 8 20 8" />
            </svg>DXF保存
        </button>
        <button id="btn-download" class="btn-download" title="SVGをダウンロード">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" />
            </svg>SVG保存
        </button>
    </div>

    <!-- JavaScript 分離 (依存関係順) -->
    <script src="js/history.js"></script>
    <script src="js/canvas.js"></script>
    <script src="js/export.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
